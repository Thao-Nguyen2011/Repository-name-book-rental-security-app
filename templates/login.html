{% extends "base.html" %}

{% block content %}
<div class="form-box">
    <h2>Đăng nhập</h2>

    <form method="POST">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" required>

        <label>Mật khẩu</label>
        <input type="password" name="password" required>

        <button type="submit">Đăng nhập</button>
    </form>

    <p class="hint">Admin: <b>admin</b> / <b>admin123</b></p>
    <p class="hint">Nhân viên: <b>staff</b> / <b>staff123</b></p>
</div>
{% endblock %}
